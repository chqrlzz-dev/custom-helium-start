<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A minimalist, high-performance search dashboard.">
    <meta name="theme-color" content="#152671">

    <title>Helium New Page</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://suggestqueries.google.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="assets/js/config.js"></script>
</head>

<body class="flex flex-col h-screen select-none">
    <main class="flex-1 flex flex-col items-center justify-center px-6 relative z-10">
        
        <!-- Header Stack: Time -> Meta -> Date -->
        <header class="flex flex-col items-center text-center pointer-events-none">
            <div id="clock-container" class="entrance-reveal">
                <h1 id="clock">00:00</h1>
                <div class="clock-meta">
                    <span id="ampm"></span>
                    <div id="time-toggle" class="pointer-events-auto" title="Toggle 12/24hr">12H</div>
                </div>
            </div>
            <p id="date" class="entrance-reveal">Monday, January 1</p>
        </header>

        <!-- Content Stack: Search -> Tray -->
        <div class="content-stack entrance-reveal">
            <div class="search-form-wrapper">
                <form id="search-form" class="w-full relative z-20" role="search">
                    <div class="search-container relative flex items-center" id="search-combobox">
                        <svg class="search-icon absolute left-5 w-5 h-5 text-white pointer-events-none z-20" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <div id="bang-indicator"
                            class="absolute left-4 w-7 h-7 z-30 flex items-center justify-center opacity-0 transition-all pointer-events-none"></div>
                        <input type="text" id="search-input" placeholder="Search or !focus"
                            class="search-input text-lg font-medium relative z-10"
                            autocomplete="off" autofocus aria-label="Search">
                    </div>
                    <ul id="suggestions-list" class="suggestions-dropdown m-0 p-0 list-none" role="listbox"></ul>
                </form>
            </div>

            <nav id="tab-tray" class="tab-tray select-none">
                <!-- Bookmarks injected here -->
            </nav>
        </div>

    </main>

    <!-- Modal for Adding Bookmarks -->
    <div id="bookmark-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-6">Add New Bookmark</h2>
            <div class="flex flex-col gap-4">
                <div class="input-group">
                    <label for="site-name">Site Name</label>
                    <input type="text" id="site-name" placeholder="e.g. GitHub" class="modal-input">
                </div>
                <div class="input-group">
                    <label for="site-url">Site URL</label>
                    <input type="text" id="site-url" placeholder="e.g. github.com" class="modal-input">
                </div>
                <div class="flex gap-3 mt-4">
                    <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="modal-save" class="btn btn-primary">Save Bookmark</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>

</html>
